name: Tag on merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Bump patch version and create tag
        id: bump
        run: |
          set -e
          if [ ! -f package.json ]; then
            echo "package.json not found" >&2
            exit 1
          fi
          echo "Current version: $(node -p \"require('./package.json').version\")"
          node -e "const fs=require('fs');const p=require('./package.json');const v=p.version.split('.').map(n=>parseInt(n));v[2]=v[2]+1;p.version=v.join('.');fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log(p.version);"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Bumped to $NEW_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): bump version to v$NEW_VERSION [skip ci]" || echo "No changes to commit"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          git push origin HEAD:main --follow-tags
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Announce
        run: echo "Created release tag ${{ steps.bump.outputs.new_version }}"
