name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Point winccoa-manager to CI stub
        # The real package is a local native add-on not available outside WinCC OA.
        # esbuild marks it --external so the bundle keeps require('winccoa-manager')
        # and the stub only needs to satisfy npm install.
        run: npm pkg set "dependencies.winccoa-manager=file:./.github/ci-stubs/winccoa-manager"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Create .env placeholder
        # .env is gitignored; the build script copies it to dist as a template.
        run: New-Item -ItemType File -Path .env -Force
        shell: pwsh

      - name: Build bundle
        run: npm run build

      - name: Create release archive
        # tar is available on Windows 10+ and creates a platform-neutral archive
        # -C dist . changes into the dist directory first so files are at the archive root
        run: tar -czf winccoa-mcp-server-${{ github.ref_name }}.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: winccoa-mcp-server-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
